aid: amdocs
name: Amdocs
description: >-
  Amdocs is a global technology company providing software and services to
  communications and media companies worldwide. Its connectX platform is a
  cloud-native SaaS BSS solution for telecom operators covering customer
  management, billing, provisioning, and subscription lifecycle. Amdocs also
  provides MarketONE for digital BSS, NetCracker for OSS network management,
  and an expanding suite of AI-powered telco solutions built on TM Forum Open
  APIs.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Telecom
  - BSS
  - OSS
  - Billing
  - Customer Management
  - MVNO
  - 5G
  - SaaS
