  - type: Features
    data:
      - name: TM Forum Open API Compliance
        description: >-
          All connectX APIs comply with TM Forum Open API standards, enabling
          fast integration with third-party systems and reducing customization
          requirements.
      - name: AI-Native Capabilities
        description: >-
          GenAI-powered platform capabilities including AI-driven customer
          journeys, predictive analytics, and automated decision making for
          telco operations.
      - name: Cloud-Native SaaS Architecture
        description: >-
          Serverless microservices architecture deployed on AWS providing
          elastic scalability, local data residency compliance, and rapid
          deployment for MVNOs and telcos.
      - name: eSIM Management
        description: >-
          Built-in eSIM lifecycle management enabling telcos and MVNOs to
          support digital SIM provisioning without physical SIM cards.
      - name: Omnichannel Customer Experience
        description: >-
          Pre-built customer journeys spanning mobile apps, web self-service,
          and multi-channel support for consumer and business segments.
      - name: MVNO and MVNE Support
        description: >-
          End-to-end MVNO and MVNE capabilities including wireless prepaid,
          postpaid, and B2C solutions with rapid market launch support.
      - name: Catalog and Order Management
        description: >-
          Flexible product catalog management for bundling connectivity with
          digital services, plus end-to-end order management across consumer,
          business, and enterprise segments.
      - name: Revenue Management
        description: >-
          Converged billing, revenue assurance, and monetization capabilities
          supporting current and emerging revenue models including subscription
          and usage-based billing.
  - type: UseCases
    data:
      - name: MVNO Launch
        description: >-
          Rapidly launch new MVNO brands with pre-integrated telco-in-a-box
          capabilities including customer management, billing, and digital
          channels.
      - name: BSS Digital Transformation
        description: >-
          Migrate from legacy BSS to cloud-native SaaS BSS with TM Forum Open
          API compliance and pre-built integrations for telco digital
          transformation.
      - name: 5G Monetization
        description: >-
          Launch and monetize 5G services with flexible catalog management,
          usage-based billing, and analytics for network slicing and IoT.
      - name: Customer Self-Service
        description: >-
          Deploy omnichannel self-service portals and mobile apps with
          pre-built customer journeys for account management, plan changes, and
          billing.
      - name: Gen Z Mobile Services
        description: >-
          Launch fully customizable mobile plans enabling subscribers to
          configure data, calls, texts, and plan length via AI-powered apps.
      - name: IoT Service Management
        description: >-
          Manage IoT connectivity, device onboarding, and usage-based billing
          for enterprise IoT deployments across telecom networks.
  - type: Integrations
    data:
      - name: AWS
        description: >-
          connectX is powered by Amazon Web Services providing cloud
          infrastructure, elastic scalability, and global reach.
      - name: TM Forum Open APIs
        description: >-
          Full compliance with TM Forum Open API standards enabling plug-and-play
          integration with ecosystem partners and third-party systems.
      - name: Microsoft
        description: >-
          Customer Engagement Platform partnership with Microsoft for AI-driven
          customer interactions and analytics.
      - name: Network Management Systems
        description: >-
          Integration with multi-vendor network management systems and OSS
          platforms via NetCracker APIs.
  - type: Solutions
    data:
      - name: connectX
        description: >-
          All-in-one SaaS BSS platform for telcos and MVNOs with AI-powered
          customer management, billing, and monetization capabilities.
      - name: MarketONE
        description: >-
          Digital BSS platform for managing and monetizing subscriptions with
          integrated digital partners and omnichannel delivery.
      - name: Amdocs Networks
        description: >-
          Telco cloud transformation solutions for 5G, fiber, and IoT network
          deployment and optimization.
      - name: Digital Financial Services Platform
        description: >-
          Mobile wallet and financial services enablement for telco operators
          entering digital banking and fintech markets.
