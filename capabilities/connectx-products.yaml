naftiko: 1.0.0-alpha2
info:
  label: Amdocs connectX BSS API — Products
  description: 'Amdocs connectX BSS API — Products. 1 operations. Lead operation: List products. Self-contained Naftiko capability
    covering one Amdocs business surface.'
  tags:
  - Amdocs
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMDOCS_API_KEY: AMDOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: connectx-products
    baseUri: https://api.amdocs-dbs.com
    description: Amdocs connectX BSS API — Products business capability. Self-contained, no shared references.
    resources:
    - name: v1-products
      path: /v1/products
      operations:
      - name: listproducts
        method: GET
        description: List products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productType
          in: query
          type: string
        - name: status
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.AMDOCS_API_KEY}}'
  exposes:
  - type: rest
    namespace: connectx-products-rest
    port: 8080
    description: REST adapter for Amdocs connectX BSS API — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/products
      name: v1-products
      description: REST surface for v1-products.
      operations:
      - method: GET
        name: listproducts
        description: List products
        call: connectx-products.listproducts
        with:
          productType: rest.productType
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connectx-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amdocs connectX BSS API — Products. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-products
      description: List products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connectx-products.listproducts
      with:
        productType: tools.productType
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
