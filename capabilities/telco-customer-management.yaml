naftiko: 1.0.0-alpha2
info:
  label: Amdocs Telco Customer Management
  description: Unified workflow for telecom operators managing customer accounts, subscriptions, billing, and service catalog
    via Amdocs connectX BSS API. Supports BSS operators, customer care agents, and billing teams.
  tags:
  - Amdocs
  - Telecom
  - BSS
  - Customer Management
  - Billing
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AMDOCS_CLIENT_ID: AMDOCS_CLIENT_ID
    AMDOCS_CLIENT_SECRET: AMDOCS_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: amdocs-connectx
    baseUri: https://api.amdocs-dbs.com
    description: Amdocs connectX BSS API for telecom customer and billing management.
    authentication:
      type: bearer
      token: '{{AMDOCS_ACCESS_TOKEN}}'
    resources:
    - name: customers
      path: /v1/customers
      description: Telecom customer account management
      operations:
      - name: list-customers
        method: GET
        description: List customer accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-customer
        method: POST
        description: Create a new customer account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            firstName: '{{tools.firstName}}'
            lastName: '{{tools.lastName}}'
            email: '{{tools.email}}'
            customerType: '{{tools.customerType}}'
    - name: subscriptions
      path: /v1/customers/{customerId}/subscriptions
      description: Customer subscription lifecycle
      operations:
      - name: list-subscriptions
        method: GET
        description: List customer subscriptions
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Customer ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-subscription
        method: POST
        description: Add a subscription to a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invoices
      path: /v1/customers/{customerId}/invoices
      description: Customer billing invoices
      operations:
      - name: list-invoices
        method: GET
        description: Retrieve customer invoices
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
          description: Customer ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products
      path: /v1/products
      description: Product and service catalog
      operations:
      - name: list-products
        method: GET
        description: List available products and services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: amdocs-telco-crm-api
    description: Unified REST API for telco customer management workflows.
    resources:
    - path: /v1/customers
      name: customers
      description: Telecom customer account management
      operations:
      - method: GET
        name: list-customers
        description: List all customer accounts
        call: amdocs-connectx.list-customers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-customer
        description: Onboard a new customer
        call: amdocs-connectx.create-customer
        with:
          firstName: rest.firstName
          lastName: rest.lastName
          email: rest.email
          customerType: rest.customerType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions
      name: subscriptions
      description: Customer subscription management
      operations:
      - method: GET
        name: list-subscriptions
        description: List subscriptions for a customer
        call: amdocs-connectx.list-subscriptions
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-subscription
        description: Add a service subscription
        call: amdocs-connectx.create-subscription
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices
      name: invoices
      description: Customer billing invoices
      operations:
      - method: GET
        name: list-invoices
        description: List invoices for a customer
        call: amdocs-connectx.list-invoices
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products
      name: products
      description: Product and service catalog
      operations:
      - method: GET
        name: list-products
        description: Browse available products and plans
        call: amdocs-connectx.list-products
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amdocs-telco-crm-mcp
    transport: http
    description: MCP server for AI-assisted telco customer management and BSS operations.
    tools:
    - name: list-customers
      description: List telecom customer accounts
      hints:
        readOnly: true
        openWorld: true
      call: amdocs-connectx.list-customers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-customer
      description: Onboard a new telecom customer
      hints:
        readOnly: false
      call: amdocs-connectx.create-customer
      with:
        firstName: tools.firstName
        lastName: tools.lastName
        email: tools.email
        customerType: tools.customerType
      outputParameters:
      - type: object
        mapping: $.
    - name: list-subscriptions
      description: List service subscriptions for a customer
      hints:
        readOnly: true
        openWorld: true
      call: amdocs-connectx.list-subscriptions
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-subscription
      description: Add a service subscription to a customer account
      hints:
        readOnly: false
      call: amdocs-connectx.create-subscription
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-invoices
      description: Retrieve billing invoices for a customer
      hints:
        readOnly: true
        openWorld: true
      call: amdocs-connectx.list-invoices
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-products
      description: Browse the service catalog and available plans
      hints:
        readOnly: true
        openWorld: true
      call: amdocs-connectx.list-products
      outputParameters:
      - type: object
        mapping: $.
