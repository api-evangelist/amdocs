naftiko: 1.0.0-alpha2
info:
  label: Amdocs connectX BSS API — Customers
  description: 'Amdocs connectX BSS API — Customers. 4 operations. Lead operation: List customers. Self-contained Naftiko
    capability covering one Amdocs business surface.'
  tags:
  - Amdocs
  - Customers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMDOCS_API_KEY: AMDOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: connectx-customers
    baseUri: https://api.amdocs-dbs.com
    description: Amdocs connectX BSS API — Customers business capability. Self-contained, no shared references.
    resources:
    - name: v1-customers
      path: /v1/customers
      operations:
      - name: listcustomers
        method: GET
        description: List customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: customerType
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
      - name: createcustomer
        method: POST
        description: Create a new customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-customers-customerId
      path: /v1/customers/{customerId}
      operations:
      - name: getcustomer
        method: GET
        description: Get customer by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
      - name: updatecustomer
        method: PATCH
        description: Update customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AMDOCS_API_KEY}}'
  exposes:
  - type: rest
    namespace: connectx-customers-rest
    port: 8080
    description: REST adapter for Amdocs connectX BSS API — Customers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/customers
      name: v1-customers
      description: REST surface for v1-customers.
      operations:
      - method: GET
        name: listcustomers
        description: List customers
        call: connectx-customers.listcustomers
        with:
          status: rest.status
          customerType: rest.customerType
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcustomer
        description: Create a new customer
        call: connectx-customers.createcustomer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/customers/{customerid}
      name: v1-customers-customerid
      description: REST surface for v1-customers-customerId.
      operations:
      - method: GET
        name: getcustomer
        description: Get customer by ID
        call: connectx-customers.getcustomer
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatecustomer
        description: Update customer
        call: connectx-customers.updatecustomer
        with:
          customerId: rest.customerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connectx-customers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amdocs connectX BSS API — Customers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-customers
      description: List customers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connectx-customers.listcustomers
      with:
        status: tools.status
        customerType: tools.customerType
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-customer
      description: Create a new customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connectx-customers.createcustomer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer-id
      description: Get customer by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connectx-customers.getcustomer
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-customer
      description: Update customer
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connectx-customers.updatecustomer
      with:
        customerId: tools.customerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
