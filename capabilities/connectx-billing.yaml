naftiko: 1.0.0-alpha2
info:
  label: Amdocs connectX BSS API — Billing
  description: 'Amdocs connectX BSS API — Billing. 1 operations. Lead operation: List customer invoices. Self-contained Naftiko
    capability covering one Amdocs business surface.'
  tags:
  - Amdocs
  - Billing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMDOCS_API_KEY: AMDOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: connectx-billing
    baseUri: https://api.amdocs-dbs.com
    description: Amdocs connectX BSS API — Billing business capability. Self-contained, no shared references.
    resources:
    - name: v1-customers-customerId-invoices
      path: /v1/customers/{customerId}/invoices
      operations:
      - name: listcustomerinvoices
        method: GET
        description: List customer invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
        - name: fromDate
          in: query
          type: string
        - name: toDate
          in: query
          type: string
        - name: status
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.AMDOCS_API_KEY}}'
  exposes:
  - type: rest
    namespace: connectx-billing-rest
    port: 8080
    description: REST adapter for Amdocs connectX BSS API — Billing. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/customers/{customerid}/invoices
      name: v1-customers-customerid-invoices
      description: REST surface for v1-customers-customerId-invoices.
      operations:
      - method: GET
        name: listcustomerinvoices
        description: List customer invoices
        call: connectx-billing.listcustomerinvoices
        with:
          customerId: rest.customerId
          fromDate: rest.fromDate
          toDate: rest.toDate
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connectx-billing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amdocs connectX BSS API — Billing. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-customer-invoices
      description: List customer invoices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connectx-billing.listcustomerinvoices
      with:
        customerId: tools.customerId
        fromDate: tools.fromDate
        toDate: tools.toDate
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
