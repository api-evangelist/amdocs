specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Amdocs
providerId: amdocs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Telecom
  - BSS
  - OSS
  - Billing
  - Customer Management
  - MVNO
  - 5G
  - SaaS
  - Rate Limiting
description: >-
  Amdocs does not publish public API rate limits for connectX. Throughput and concurrency are provisioned per tenant under the master service agreement and exposed through TM Forum Open API conventions inside each customer's deployment. This artifact remains a scaffold pending public documentation.
notes: >-
  Amdocs connectX is a B2B cloud-native BSS SaaS platform sold to telecom operators under enterprise master service agreements. Pricing is bespoke per operator (subscriber count, modules enabled, AWS region) and is not published publicly. Rate limits and quotas are governed by per-tenant capacity provisioning. Reconcile when Amdocs publishes a public pricing or rate-limit page.
sources:
  - https://devportal.amdocs-dbs.com/
  - https://developer.amdocs-dbs.com/reference/getting-started-with-your-api
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Undocumented - bilateral agreement
    scope: contract
    metric: varies
    limit: 'see partner agreement; not publicly documented'
policies:
  - name: Documentation Status
    description: >-
      Amdocs does not publish public per-second or per-minute API rate
      limits. Throughput, concurrency, and burst behavior are governed by the
      relevant partner, supplier, or merchant agreement.
  - name: Backoff Strategy
    description: >-
      Where any HTTP API is exposed, clients should implement exponential
      backoff with jitter and honor any Retry-After header returned on 429
      or 503 responses.
maintainers:
