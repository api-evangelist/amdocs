description: >-
  FinOps scaffold for Amdocs connectX BSS. Amdocs invoices telecom operators under enterprise SaaS contracts; usage telemetry is exposed through tenant dashboards but a public FOCUS-aligned billing schema is not published. Reconcile when Amdocs publishes consumption or chargeback documentation.
notes: >-
  Amdocs connectX is a B2B cloud-native BSS SaaS platform sold to telecom operators under enterprise master service agreements. Pricing is bespoke per operator (subscriber count, modules enabled, AWS region) and is not published publicly. Rate limits and quotas are governed by per-tenant capacity provisioning. Reconcile when Amdocs publishes a public pricing or rate-limit page.
